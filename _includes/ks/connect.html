<div class="ks-connect" id="ks-connect">
  <div class="ks-connect-inner">

    <div class="ks-provider-tabs">
      <button class="ks-provider-tab ks-provider-tab--active" data-provider="groq">Groq <span class="ks-provider-badge">Cloud · Free</span></button>
      <button class="ks-provider-tab" data-provider="ollama">Ollama <span class="ks-provider-badge">Local</span></button>
    </div>

    <div id="ks-groq-fields">
      <div class="ks-key-row">
        <input type="password" id="ks-api-key" class="ks-model-select" placeholder="Groq API key — gsk_…" autocomplete="off" />
        <select id="ks-model-select" class="ks-model-select" style="max-width:220px;">
          <option value="llama-3.3-70b-versatile" selected>Llama 3.3 70B</option>
          <option value="meta-llama/llama-4-scout-17b-16e-instruct">Llama 4 Scout 17B</option>
          <option value="openai/gpt-oss-120b">GPT OSS 120B</option>
          <option value="openai/gpt-oss-20b">GPT OSS 20B</option>
          <option value="moonshotai/kimi-k2-instruct">Kimi K2</option>
          <option value="qwen/qwen3-32b">Qwen 3 32B</option>
          <option value="groq/compound">Groq Compound</option>
          <option value="groq/compound-mini">Groq Compound Mini</option>
          <option value="llama-3.1-8b-instant">Llama 3.1 8B</option>
        </select>
      </div>
      <p class="ks-connect-hint">
        Get a free key at <a href="https://console.groq.com/keys" target="_blank" rel="noopener">console.groq.com/keys</a>.
      </p>
    </div>

    <div id="ks-ollama-fields" style="display:none;">
      <div class="ks-key-row">
        <select id="ks-ollama-model-select" class="ks-model-select">
          <option value="">Click Ollama tab to detect models…</option>
        </select>
        <button type="button" class="ks-ollama-refresh" id="ks-ollama-refresh" title="Re-detect models">&#8635;</button>
      </div>
      <div id="ks-ollama-custom-row" style="display:none; margin-top:0.4rem;">
        <input type="text" id="ks-ollama-custom" class="ks-model-select"
               placeholder="Model name (e.g. llama3.2:8b)" autocomplete="off" style="width:100%;" />
      </div>
      <p class="ks-connect-hint">
        Ollama must be running at <code>localhost:11434</code>.
        Get it at <a href="https://ollama.com" target="_blank" rel="noopener">ollama.com</a>.
      </p>
    </div>

    <button class="ks-key-btn" id="ks-connect-btn">Start</button>
    <div class="ks-browse-row">
      <button class="ks-browse-btn" id="ks-browse-btn">Browse ingested papers without connecting →</button>
    </div>
  </div>
</div>
