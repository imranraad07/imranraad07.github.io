<script type="application/json" id="ks-rl-data">
[{% for f in rl_pdfs %}{% assign n = f.basename | remove: '"' %}{"name":"{{ n | replace: "_", " " | replace: "-", " " }}","key":"ks_rl_{{ n | remove: " " | truncate: 60, "" }}","path":"{{ f.path | relative_url }}","type":"rl"}{% unless forloop.last %},{% endunless %}{% endfor %}]
</script>

<script type="application/json" id="ks-lab-data">
[{% for f in lab_pdfs %}{% assign n = f.basename | remove: '"' %}{"name":"{{ n | replace: "_", " " | replace: "-", " " }}","key":"ks_lab_{{ n | remove: " " | truncate: 60, "" }}","path":"{{ f.path | relative_url }}","type":"lab"}{% unless forloop.last %},{% endunless %}{% endfor %}]
</script>
